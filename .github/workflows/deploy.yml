name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            sudo git fetch origin main
            sudo git reset --hard origin/main
            cd server && sudo npm install --omit=dev && cd ..
            # Wiki do dashboard-bot manager quản lý (không phải PM2):
            # kill process là manager tự khởi động lại với code mới
            sudo pkill -u root -f "server/index.js" || true
            sleep 3
            sudo git log --oneline -1
            # --- Chẩn đoán Hỏi đáp AI vòng 2 (tạm thời, sẽ gỡ sau) ---
            sleep 5
            sudo grep '^PORT=' server/.env || echo "khong co PORT trong .env"
            WPID=$(pgrep -f "server/index.js" | head -1) || true
            echo "wiki pid: $WPID"
            sudo ss -ltnp | grep node || true
            WPORT=$(sudo ss -ltnp 2>/dev/null | grep "pid=$WPID," | head -1 | awk '{split($4,a,":"); print a[length(a)]}') || true
            echo "wiki port: ${WPORT:-khong tim thay}"
            echo "--- test outbound toi Gemini tu server ---"
            time curl -s -m 15 -o /dev/null -w "Gemini HTTP %{http_code}\n" "https://generativelanguage.googleapis.com/v1beta/models" || true
            echo "--- test /api/ask qua port that ---"
            time curl -s -m 90 -o /tmp/ask.json -w "HTTP %{http_code}\n" -X POST "http://localhost:${WPORT:-4105}/api/ask" -H 'Content-Type: application/json' -d '{"question":"Tỷ giá báo khách hiện tại là bao nhiêu?"}' || true
            head -c 500 /tmp/ask.json || true
            echo ""
