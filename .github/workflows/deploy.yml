name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            sudo git fetch origin main
            sudo git reset --hard origin/main
            cd server && sudo npm install --omit=dev && cd ..
            # --- Chẩn đoán quyền admin (tạm, sẽ gỡ) ---
            echo "Cau truc .env (chi ten bien + do dai gia tri, khong in gia tri):"
            sudo awk -F= '{print NR": "$1" ("length($0)-length($1)-1" ky tu)"}' server/.env || true
            # Sua dong bi dinh neu tee -a append vao file thieu newline cuoi
            sudo sed -i 's/^\(ADMIN_EMAILS=.*\)GEMINI_API_KEY=.*$/\1/' server/.env || true
            echo "Sau khi sua:"
            sudo awk -F= '{print NR": "$1" ("length($0)-length($1)-1" ky tu)"}' server/.env || true
            echo "config.json (admins che bot, chi 3 ky tu dau):"
            sudo jq -r '"admins: " + (.admins | map(.[0:3] + "***") | join(", ")) + " | so editors: " + (.editors | length | tostring)' server/data/config.json || sudo ls -la server/data/ || true
            # Wiki chạy TRONG container của dashboard-bot (cmdline "node index.js",
            # cwd /app/data/bots/<id>/server) — pkill theo tên không trúng được.
            # Tìm đúng process theo cwd chứa id bot rồi kill; manager tự respawn
            # với code mới. (Xác minh 2026-06-11 qua log chẩn đoán deploy #36-#38)
            for pid in $(pgrep node); do
              cwd=$(sudo readlink /proc/$pid/cwd 2>/dev/null) || true
              case "$cwd" in *e9778bedc4f9f670*) echo "restart wiki pid=$pid"; sudo kill $pid || true;; esac
            done
            sleep 5
            sudo git log --oneline -1
