name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            sudo git fetch origin main
            sudo git reset --hard origin/main
            cd server && sudo npm install --omit=dev && cd ..
            # Wiki do dashboard-bot manager quản lý (không phải PM2):
            # kill process là manager tự khởi động lại với code mới
            sudo pkill -u root -f "server/index.js" || true
            sleep 3
            sudo git log --oneline -1
            # --- Chẩn đoán Hỏi đáp AI (tạm thời, sẽ gỡ sau) ---
            node --version || true
            sudo awk -F= '/^GEMINI_API_KEY=/{print "GEMINI key: dai", length($2), "ky tu, prefix", substr($2,1,4)}' server/.env || true
            for i in 1 2 3 4 5; do curl -s -o /dev/null http://localhost:4105/api/me && break; sleep 2; done
            echo "--- test /api/ask truc tiep tren server (bo qua proxy) ---"
            time curl -s -m 90 -o /tmp/ask.json -w "HTTP %{http_code}\n" -X POST http://localhost:4105/api/ask -H 'Content-Type: application/json' -d '{"question":"Tỷ giá báo khách hiện tại là bao nhiêu?"}' || true
            head -c 500 /tmp/ask.json || true
            echo ""
