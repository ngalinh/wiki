name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            sudo git fetch origin main
            sudo git reset --hard origin/main
            cd server && sudo npm install --omit=dev && cd ..
            # Wiki chạy TRONG container của dashboard-bot (cmdline "node index.js",
            # cwd /app/data/bots/<id>/server) — pkill theo tên không trúng được.
            # Tìm đúng process theo cwd chứa id bot rồi kill; manager tự respawn
            # với code mới. (Xác minh 2026-06-11 qua log chẩn đoán deploy #36-#38)
            for pid in $(pgrep node); do
              cwd=$(sudo readlink /proc/$pid/cwd 2>/dev/null) || true
              case "$cwd" in *e9778bedc4f9f670*) echo "restart wiki pid=$pid"; sudo kill $pid || true;; esac
            done
            sleep 5
            sudo git log --oneline -1
