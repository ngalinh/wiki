name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            sudo git pull origin main
            cd server && sudo npm install --production
            echo "=== vmadmin pm2 list ===" && pm2 jlist 2>/dev/null | python3 -c "import sys,json; [print(p.get('name','?'), p.get('pm_id','?'), p.get('pid','?'), p.get('pm2_env',{}).get('PORT','')) for p in json.load(sys.stdin)]" 2>/dev/null || true
            echo "=== sudo pm2 list ===" && sudo pm2 jlist 2>/dev/null | python3 -c "import sys,json; [print(p.get('name','?'), p.get('pm_id','?'), p.get('pid','?'), p.get('pm2_env',{}).get('PORT','')) for p in json.load(sys.stdin)]" 2>/dev/null || true
