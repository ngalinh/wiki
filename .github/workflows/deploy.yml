name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            sudo git pull origin main
            cd server && sudo npm install --production && cd ..
            OLD_PID=$(pgrep -f "node server/index.js" 2>/dev/null || echo "")
            [ -n "$OLD_PID" ] && sudo kill $OLD_PID && sleep 1 || true
            nohup sudo node server/index.js >> /tmp/wiki.log 2>&1 &
            sleep 2
            echo "Wiki PID: $(pgrep -f 'node server/index.js')"
