name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            sudo git pull origin main
            cd server && sudo npm install --production
            echo "=== port 4105 ===" && sudo ss -tlnp 'sport = :4105' 2>/dev/null || sudo lsof -i :4105 2>/dev/null || true
            echo "=== pm2 cwd ===" && pm2 jlist 2>/dev/null | python3 -c "import sys,json; [print(p.get('name','?'), p.get('pid','?'), p.get('pm2_env',{}).get('pm_cwd',''), p.get('pm2_env',{}).get('PORT','')) for p in json.load(sys.stdin)]" 2>/dev/null || true
            echo "=== node processes ===" && ps aux 2>/dev/null | grep node | grep -v grep || true
